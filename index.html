<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Mirror</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    /* окно центрирует #stage; вокруг — чёрные поля (letterbox) */
    body { display: flex; align-items: center; justify-content: center; }
    /* #stage — прямоугольник соотношения «фида» (портрет 9:16). Размер в px
       ставит main.ts (computeFeedRect): крупнейший такой прямоугольник под окно. */
    /* overflow:hidden — рамка фида = граница устройства: UI не бликует на поля */
    #stage { position: relative; flex: 0 0 auto; overflow: hidden; }
    #stage canvas { display: block; width: 100%; height: 100%; }
    #overlay {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center; text-align: center;
      color: #fff; font: 16px/1.6 system-ui; background: #000; padding: 40px;
    }
  </style>
  <link rel="stylesheet" href="/src/lux/lux-theme.css">
</head>
<body>
  <div id="overlay"></div>
  <div id="stage">
    <div id="lux-ui">
      <!-- Ожидание: лого + приглашение сверху, «Подойдите ближе» снизу. Фон — чёрный. -->
      <div class="lux-layer" data-idle>
        <header class="lux-top">
          <img id="lux-logo-img" class="lux-logo-img" alt="Stellar Residence" src="/assets/ui/logo.png">
          <div id="lux-logo-text" class="lux-logo" style="display:none">STELLAR <span>RESIDENCE</span></div>
          <div class="lux-invite-top">Хотите увидеть себя в интерьере?</div>
        </header>
        <footer class="lux-bottom">
          <div class="lux-invite">Подойдите ближе</div>
        </footer>
      </div>
      <!-- Зеркало: «Выберите интерьер» + кнопки стилей сверху, локация снизу-слева. -->
      <div class="lux-layer" data-mirror style="opacity:0">
        <header class="lux-top">
          <div class="lux-choose">Выберите интерьер</div>
          <nav class="lux-interiors" id="lux-interiors"></nav>
        </header>
        <footer class="lux-bottom lux-bottom-left">
          <div class="lux-location" id="lux-location">Лобби</div>
        </footer>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
